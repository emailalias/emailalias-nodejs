name: Publish to npm

# Fires on every annotated tag matching vX.Y.Z.
on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Build & publish
    runs-on: ubuntu-latest
    # Required for OIDC (Trusted Publisher) + npm provenance attestation.
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted-Publisher OIDC auth requires npm >= 11.5.1 (bundled with Node 22).
      # Upgrade anyway to be safe across minor Node releases.
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build

      - name: Publish to npm via Trusted Publisher
        run: npm publish --provenance --access public
